<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 대시보드</title>
    <style>
        header{background-color: black; color: white; padding: 20px;}
        .menu-bar {display: flex; justify-content: center; gap: 100px; padding: 20px; background-color: #f8f8f8;}
        .menu-bar a {text-decoration: none; color: black; font-weight: bold;}
        a{text-decoration: none; color:#f8f8f8}
    </style>
</head>
<body>
    <header>
        <h1><a href="index.html">운동 대시보드</a></h1>
        <nav class="menu-bar">
            <a href="index.html">home</a>
            <a href="timer.html">타이머</a>
        </nav>
    </header>
    <div class="progress-bar">
        <div id="gaugo">
            
        </div>
    </div>
    <div class="container" style="text-align: center; font-family: sans-serif;">
    <h2>나의 운동 대시보드</h2>
    
    <div style="background: #eee; padding: 20px; border-radius: 10px; display: inline-block;">
        <input type="number" id="manual-kcal" placeholder="소모 칼로리 입력">
        <input type="button" id="draw-btn" value="기록하기">
    </div>

    <div style="margin-top: 30px;">
        <canvas id="mainChart" width="400" height="150" style="border:1px solid #ddd;"></canvas>
    </div>

    <div style="margin-top: 30px; width: 400px; margin-left: auto; margin-right: auto;">
        <h3>최근 운동 내역</h3>
        <ul id="history-list" style="list-style: none; padding: 0; text-align: left;">
            </ul>
        <input type="button" id="clear-btn" value="전체 내역 삭제" style="font-size: 12px; color: gray;">
    </div>
</div>
</body>
    <script>
        // 1. 데이터 불러오기 (배열 형태)
    // weeklyData: 그래프용 (7개 칸)
    let weeklyData = JSON.parse(localStorage.getItem('workoutData')) || [0, 0, 0, 0, 0, 0, 0];
    // workoutHistory: 상세 내역용 (리스트)
    let workoutHistory = JSON.parse(localStorage.getItem('workoutHistory')) || [];

    const canvas = document.getElementById('mainChart');
    const ctx = canvas.getContext('2d');
    const historyList = document.getElementById('history-list');

    // [함수] 그래프 그리기
    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const days = ["일", "월", "화", "수", "목", "금", "토"];
        const maxKcal = Math.max(...weeklyData, 500);

        days.forEach((day, i) => {
            const barHeight = (weeklyData[i] / maxKcal) * 100;
            const x = 40 + i * 50;
            const y = 120 - barHeight;
            ctx.fillStyle = (i === new Date().getDay()) ? "blue" : "black";
            ctx.fillRect(x, y, 30, barHeight);
            ctx.fillStyle = "#333";
            ctx.fillText(day, x + 8, 140);
        });
    }

    // [함수] 내역 리스트 표시하기
    function updateHistoryUI() {
        historyList.innerHTML = ""; // 기존 목록 비우기
        // 최신순으로 보여주기 위해 reverse() 사용
        workoutHistory.slice().reverse().forEach((item) => {
            const li = document.createElement('li');
            li.style.borderBottom = "1px solid #eee";
            li.style.padding = "10px 0";
            li.innerHTML = `<strong>${item.date}</strong> - ${item.kcal}kcal 소모`;
            historyList.appendChild(li);
        });
    }

    // [이벤트] 기록하기 버튼 클릭
    document.getElementById('draw-btn').addEventListener('click', function() {
        const val = document.getElementById('manual-kcal').value;
        if (!val) return;

        const kcal = parseFloat(val);
        const today = new Date();
        const dateStr = `${today.getMonth()+1}월 ${today.getDate()}일 (${["일","월","화","수","목","금","토"][today.getDay()]})`;

        // 1. 그래프용 데이터 업데이트 (오늘 요일 칸에 더하기)
        weeklyData[today.getDay()] += kcal;

        // 2. 상세 내역 배열에 추가
        workoutHistory.push({ date: dateStr, kcal: kcal });

        // 3. 로컬 저장소 저장
        localStorage.setItem('workoutData', JSON.stringify(weeklyData));
        localStorage.setItem('workoutHistory', JSON.stringify(workoutHistory));

        // 4. UI 갱신
        drawChart();
        updateHistoryUI();
        document.getElementById('manual-kcal').value = "";
    });

    // [이벤트] 삭제 버튼
    document.getElementById('clear-btn').addEventListener('click', function() {
        if(confirm("모든 기록을 삭제할까요?")) {
            localStorage.clear();
            location.reload();
        }
    });

    // 페이지 로드 시 초기 실행
    drawChart();
    updateHistoryUI();
    </script>
</html>
